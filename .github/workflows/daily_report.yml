name: Travence BIZRAW Reports

# 한국시간 기준:
# - 일간/주간/월간: 모두 폼 제출 시 Apps Script가 자동 트리거
#   (월요일 폼 제출 → 일간 + 주간 동시 / 1일 폼 제출 → 일간 + 월간 동시 / 1일이 월요일이면 셋 다)
# - GFA 알림: 매일 오전 9시 — 전날 GFA 미입력 시 t7832@naver.com에 알림
on:
  schedule:
    # 매일 KST 09:00 = UTC 00:00 (GFA 미입력 알림 only)
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "수동 실행 모드"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  daily:
    # 폼 제출 (Apps Script → workflow_dispatch) 또는 수동 daily 실행만
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pacsafe Daily
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID_PACSAFE:     ${{ secrets.NAVER_CLIENT_ID_PACSAFE }}
          NAVER_CLIENT_SECRET_PACSAFE: ${{ secrets.NAVER_CLIENT_SECRET_PACSAFE }}
          GMAIL_APP_PASSWORD:          ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python pacsafe_daily.py --send
      - name: President Daily
        if: always()
        env:
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID_PRESIDENT:     ${{ secrets.NAVER_CLIENT_ID_PRESIDENT }}
          NAVER_CLIENT_SECRET_PRESIDENT: ${{ secrets.NAVER_CLIENT_SECRET_PRESIDENT }}
          GMAIL_APP_PASSWORD:            ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON:    ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python president_daily.py --send

  weekly:
    # 폼 제출 시 Apps Script가 KST 월요일이면 자동 트리거 / 수동 트리거도 OK
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'weekly'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pacsafe Weekly
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID_PACSAFE:     ${{ secrets.NAVER_CLIENT_ID_PACSAFE }}
          NAVER_CLIENT_SECRET_PACSAFE: ${{ secrets.NAVER_CLIENT_SECRET_PACSAFE }}
          GMAIL_APP_PASSWORD:          ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python pacsafe_weekly.py --send
      - name: President Weekly
        if: always()
        env:
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID_PRESIDENT:     ${{ secrets.NAVER_CLIENT_ID_PRESIDENT }}
          NAVER_CLIENT_SECRET_PRESIDENT: ${{ secrets.NAVER_CLIENT_SECRET_PRESIDENT }}
          GMAIL_APP_PASSWORD:            ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON:    ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python president_weekly.py --send

  monthly:
    # 폼 제출 시 Apps Script가 KST 1일이면 자동 트리거 / 수동 트리거도 OK
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'monthly'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pacsafe Monthly
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID_PACSAFE:     ${{ secrets.NAVER_CLIENT_ID_PACSAFE }}
          NAVER_CLIENT_SECRET_PACSAFE: ${{ secrets.NAVER_CLIENT_SECRET_PACSAFE }}
          GMAIL_APP_PASSWORD:          ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python pacsafe_monthly.py --send
      - name: President Monthly
        if: always()
        env:
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID_PRESIDENT:     ${{ secrets.NAVER_CLIENT_ID_PRESIDENT }}
          NAVER_CLIENT_SECRET_PRESIDENT: ${{ secrets.NAVER_CLIENT_SECRET_PRESIDENT }}
          GMAIL_APP_PASSWORD:            ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON:    ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python president_monthly.py --send

  gfa_reminder:
    # 매일 KST 09:00 (UTC 00:00) — 전날 GFA 미입력 시 알림
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install google-auth google-api-python-client
      - name: Check + Send Reminder
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_APP_PASSWORD:          ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python gfa_reminder.py
